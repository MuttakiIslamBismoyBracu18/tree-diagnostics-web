# ============================================================
#  Auto-build & deploy the web app to GitHub Pages on every push.
#
#  ONE-TIME SETUP (60 seconds):
#    GitHub repo → Settings → Pages → "Build and deployment"
#      → Source: "GitHub Actions"   (NOT "Deploy from a branch")
#    Then just: git add -A && git commit -m "update" && git push
#  Every push to main rebuilds and redeploys automatically.
# ============================================================
name: Deploy Tree Diagnostics Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
