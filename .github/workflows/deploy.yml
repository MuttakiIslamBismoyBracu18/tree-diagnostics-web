# ============================================================================
#  Build & deploy Tree Diagnostics Web to GitHub Pages on every push to main.
#  This is the ONLY deployment workflow — the old main.yml / pages.yml /
#  jekyll-gh-pages.yml were duplicates racing on the same concurrency group.
#
#  ONE-TIME SETUP:
#    GitHub repo -> Settings -> Pages -> Build and deployment
#      -> Source: "GitHub Actions"   (NOT "Deploy from a branch")
# ============================================================================
name: Deploy Tree Diagnostics Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: touch dist/.nojekyll        # stop Pages from Jekyll-processing the build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
